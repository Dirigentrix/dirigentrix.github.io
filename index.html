<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dirigentrix – Cień Kartrix</title>
    <style>
        :root {
            color-scheme: dark;
        }
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            background: #050b1a;
        }
        canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            display: block;
        }
        #ui {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }
        #welcome {
            margin: 0 16px 16px;
            text-align: center;
            color: white;
            background: rgba(0,0,0,0.62);
            padding: 15px;
            font-size: 1.2rem;
            letter-spacing: 2px;
            backdrop-filter: blur(5px);
            pointer-events: none;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.08);
        }
        #instruction {
            margin: 0 16px 10px;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            pointer-events: none;
        }
        #chatPanel {
            margin: 0 16px 18px;
            padding: 12px;
            background: rgba(0,0,0,0.55);
            border: 1px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(6px);
            border-radius: 14px;
            pointer-events: auto;
        }
        #chatHeader {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            color: rgba(255,255,255,0.82);
            font-size: 0.72rem;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        #status {
            color: rgba(136, 170, 255, 0.95);
        }
        #messageLog {
            height: 180px;
            overflow-y: auto;
            padding: 10px;
            border-radius: 10px;
            background: rgba(5, 11, 26, 0.72);
            color: white;
            font-size: 0.95rem;
            line-height: 1.4;
            margin-bottom: 10px;
        }
        .message {
            margin: 0 0 8px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .message.user { color: #dbe7ff; }
        .message.shadow { color: #ffe2b8; }
        #chatForm {
            display: flex;
            gap: 8px;
        }
        #chatInput {
            flex: 1;
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 10px;
            background: rgba(255,255,255,0.06);
            color: white;
            padding: 12px 14px;
            font: inherit;
            outline: none;
        }
        #chatInput::placeholder {
            color: rgba(255,255,255,0.35);
        }
        #sendButton {
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(136,170,255,0.9), rgba(255,170,102,0.75));
            color: #08111f;
            padding: 0 16px;
            font: inherit;
            font-weight: bold;
            cursor: pointer;
        }
        @media (max-width: 768px) {
            #welcome { font-size: 0.9rem; }
            #instruction { font-size: 0.7rem; }
            #messageLog { height: 150px; font-size: 0.85rem; }
            #chatInput { padding: 11px 12px; }
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="welcome">🜁 KARTRIX • CZEŚĆ, JESTEM DARTRIX • ZAPRASZAM 🜂</div>
        <div id="instruction">✧ mów do mnie lub wpisz wiadomość • cień reaguje • kontur • barwa • geometria ✧</div>
        <div id="chatPanel" aria-label="DARTRIX CHAT v1.0">
            <div id="chatHeader">
                <span>DARTRIX CHAT v1.0</span>
                <span id="status">offline-first • zero-tracking</span>
            </div>
            <div id="messageLog" aria-live="polite"></div>
            <form id="chatForm" autocomplete="off">
                <input id="chatInput" type="text" placeholder="Napisz do Cienia Kartrix…" aria-label="Wiadomość do Dartrix" />
                <button id="sendButton" type="submit">Wyślij</button>
            </form>
        </div>
    </div>
    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/" } } </script>
    <script type="module" src="shadow.js"></script>
</body>
</html>
